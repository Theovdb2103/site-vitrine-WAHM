<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nouveau message — WAHM</title>
</head>
<body style="margin:0;padding:0;background:#f0f0ef;font-family:'Helvetica Neue',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f0f0ef;padding:40px 16px;">
    <tr><td align="center">
      <table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;">

        <!-- HEADER -->
        <tr>
          <td style="background:#0D1B2A;padding:32px 48px;border-radius:4px 4px 0 0;">
            <table width="100%" cellpadding="0" cellspacing="0">
              <tr>
                <td>
                  <span style="font-size:22px;font-weight:900;letter-spacing:-0.02em;text-transform:uppercase;color:#ffffff;">WAHM</span>
                  <span style="color:#D4A018;font-size:22px;font-weight:900;">.</span>
                </td>
                <td align="right">
                  <span style="font-family:monospace;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:#4a6080;">Contact</span>
                </td>
              </tr>
            </table>
          </td>
        </tr>

        <!-- GOLD STRIPE -->
        <tr><td style="background:#D4A018;height:3px;"></td></tr>

        <!-- BODY -->
        <tr>
          <td style="background:#ffffff;padding:48px;">

            <h1 style="margin:0 0 6px;font-size:24px;font-weight:800;text-transform:uppercase;letter-spacing:-0.01em;color:#0D1B2A;">
              Nouveau message
            </h1>
            <div style="width:36px;height:2px;background:#FF7B2C;margin-bottom:36px;"></div>

            <!-- NOM -->
            <div style="margin-bottom:24px;">
              <div style="font-family:monospace;font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#888;margin-bottom:6px;">De</div>
              <div style="font-size:16px;font-weight:700;color:#0D1B2A;">{{from_name}}</div>
              <div style="font-size:14px;color:#D4A018;margin-top:2px;"><a href="mailto:{{from_email}}" style="color:#D4A018;text-decoration:none;">{{from_email}}</a></div>
            </div>

            <div style="height:1px;background:#f0f0ef;margin-bottom:24px;"></div>

            <!-- SUJET -->
            <div style="margin-bottom:24px;">
              <div style="font-family:monospace;font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#888;margin-bottom:6px;">Sujet</div>
              <div style="font-size:15px;color:#1a1a1a;">{{subject}}</div>
            </div>

            <div style="height:1px;background:#f0f0ef;margin-bottom:24px;"></div>

            <!-- MESSAGE -->
            <div>
              <div style="font-family:monospace;font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#888;margin-bottom:12px;">Message</div>
              <div style="font-size:15px;line-height:1.75;color:#333;white-space:pre-wrap;">{{message}}</div>
            </div>

            <!-- CTA RÉPONDRE -->
            <div style="margin-top:40px;">
              <a href="mailto:{{from_email}}" style="display:inline-block;background:#D4A018;color:#0D1B2A;font-family:monospace;font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;text-decoration:none;padding:14px 28px;">
                Répondre →
              </a>
            </div>

          </td>
        </tr>

        <!-- FOOTER -->
        <tr>
          <td style="background:#0D1B2A;padding:24px 48px;border-radius:0 0 4px 4px;">
            <table width="100%" cellpadding="0" cellspacing="0">
              <tr>
                <td style="font-family:monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:#4a6080;">
                  © 2026 World Academy of Human Movement
                </td>
                <td align="right" style="font-family:monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:#4a6080;">
                  WAHM
                </td>
              </tr>
            </table>
          </td>
        </tr>

      </table>
    </td></tr>
  </table>
</body>
</html>
