<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nouveau message — WAHM</title>
</head>
<body style="margin:0;padding:0;background:#eef0f2;font-family:'Helvetica Neue',Arial,sans-serif;">

  <!-- Préheader (texte d'aperçu invisible dans la boîte de réception) -->
  <div style="display:none;max-height:0;overflow:hidden;opacity:0;">
    Nouveau message de {{from_name}} — {{subject}}
  </div>

  <table width="100%" cellpadding="0" cellspacing="0" style="background:#eef0f2;padding:40px 16px;">
    <tr><td align="center">
      <table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;background:#ffffff;border-radius:14px;overflow:hidden;box-shadow:0 20px 50px -20px rgba(13,27,42,0.35);">

        <!-- HEADER -->
        <tr>
          <td style="background:#0D1B2A;padding:30px 40px;">
            <table width="100%" cellpadding="0" cellspacing="0">
              <tr>
                <td valign="middle">
                  <img src="https://site-vitrine-wahm.vercel.app/assets/wahm-logo.png" alt="WAHM" width="84" style="display:block;width:84px;height:auto;border:0;">
                </td>
                <td align="right" valign="middle">
                  <span style="display:inline-block;font-family:monospace;font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#E9B14A;background:rgba(212,160,24,0.12);border:1px solid rgba(212,160,24,0.35);border-radius:20px;padding:6px 14px;">
                    Contact
                  </span>
                </td>
              </tr>
            </table>
          </td>
        </tr>

        <!-- GOLD STRIPE -->
        <tr><td style="background:linear-gradient(90deg,#D4A018,#FF7B2C);height:4px;font-size:0;line-height:0;">&nbsp;</td></tr>

        <!-- BODY -->
        <tr>
          <td style="background:#ffffff;padding:44px 40px 40px;">

            <h1 style="margin:0 0 8px;font-family:'Helvetica Neue',Arial,sans-serif;font-size:23px;font-weight:800;text-transform:uppercase;letter-spacing:-0.01em;color:#0D1B2A;">
              Nouveau message
            </h1>
            <div style="width:40px;height:3px;background:#FF7B2C;border-radius:2px;margin-bottom:32px;"></div>

            <!-- NOM -->
            <table width="100%" cellpadding="0" cellspacing="0" style="background:#F6F7F9;border-radius:10px;margin-bottom:14px;">
              <tr>
                <td style="padding:16px 20px;">
                  <div style="font-family:monospace;font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#8A93A0;margin-bottom:6px;">De</div>
                  <div style="font-size:16px;font-weight:700;color:#0D1B2A;">{{from_name}}</div>
                  <div style="font-size:14px;margin-top:2px;"><a href="mailto:{{from_email}}" style="color:#B8860B;text-decoration:none;">{{from_email}}</a></div>
                </td>
              </tr>
            </table>

            <!-- SUJET -->
            <table width="100%" cellpadding="0" cellspacing="0" style="background:#F6F7F9;border-radius:10px;margin-bottom:14px;">
              <tr>
                <td style="padding:16px 20px;">
                  <div style="font-family:monospace;font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#8A93A0;margin-bottom:6px;">Sujet</div>
                  <div style="font-size:15px;color:#1a1a1a;">{{subject}}</div>
                </td>
              </tr>
            </table>

            <!-- MESSAGE -->
            <table width="100%" cellpadding="0" cellspacing="0" style="background:#F6F7F9;border-radius:10px;margin-bottom:8px;">
              <tr>
                <td style="padding:20px;">
                  <div style="font-family:monospace;font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#8A93A0;margin-bottom:10px;">Message</div>
                  <div style="font-size:15px;line-height:1.75;color:#333;white-space:pre-wrap;">{{message}}</div>
                </td>
              </tr>
            </table>

            <!-- CTA RÉPONDRE -->
            <table cellpadding="0" cellspacing="0" style="margin-top:32px;">
              <tr>
                <td style="background:#FF7B2C;border-radius:8px;">
                  <a href="mailto:{{from_email}}" style="display:inline-block;color:#ffffff;font-family:monospace;font-size:11px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;text-decoration:none;padding:14px 28px;">
                    Répondre →
                  </a>
                </td>
              </tr>
            </table>

          </td>
        </tr>

        <!-- FOOTER -->
        <tr>
          <td style="background:#0D1B2A;padding:22px 40px;">
            <table width="100%" cellpadding="0" cellspacing="0">
              <tr>
                <td valign="middle">
                  <img src="https://site-vitrine-wahm.vercel.app/assets/wahm-logo.png" alt="WAHM" width="50" style="display:block;width:50px;height:auto;border:0;opacity:0.7;">
                </td>
                <td align="right" valign="middle" style="font-family:monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:#4a6080;">
                  © 2026 World Academy of Human Movement
                </td>
              </tr>
            </table>
          </td>
        </tr>

      </table>
    </td></tr>
  </table>
</body>
</html>
